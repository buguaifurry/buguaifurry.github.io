<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户端软件下载</title>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,system-ui}
        html,body{width:100%;min-height:100%;background:#f0f4f9;}
        
        .header{
            width:100%;
            background:linear-gradient(135deg,#3671e9,#2050c9);
            padding: 12px 5%;
            display:flex;
            align-items:center;
            gap: 12px;
            justify-content: space-between;
        }
        .header-left{
            display: flex;
            align-items: center;
            gap:12px;
        }
        .avatar{
            width:42px;
            height:42px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #fff;
        }
        .header-text h1{
            color:#fff;
            font-size:24px;
            font-weight:bold;
            line-height:1.1;
        }
        .back-index{
            color:#fff;
            text-decoration: none;
            border:1px solid #fff;
            padding:6px 12px;
            border-radius:6px;
            font-size:15px;
            transition: 0.2s;
        }
        .back-index:hover{
            background:#fff;
            color:#2050c9;
        }

        /* 下载区域样式 */
        .download-wrap{
            width:90%;
            max-width:900px;
            margin:40px auto;
        }
        .download-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 22px;
            background:#fff;
            border-radius:10px;
            margin-bottom:14px;
            box-shadow:0 2px 10px #dde4ef;
        }
        .download-name{
            font-size:17px;
            color:#222;
            display:flex;
            align-items:center;
            gap:10px;
            /* 固定左侧区域宽度，实现右侧按钮全部对齐 */
            flex:1;
        }
        .download-name i{
            font-size:20px;
            color:#2563eb;
        }
        .down-btn{
            background:#2563eb;
            color:#fff;
            text-decoration:none;
            padding:8px 22px;
            border-radius:999px;
            transition:0.2s;
            /* 按钮固定宽度，文字居中统一对齐 */
            width:110px;
            text-align:center;
        }
        .down-btn:hover{
            background:#1d4ed8;
        }

        @media(max-width:768px){
            .header{padding:12px 5%;gap:10px}
            .avatar{width:35px;height:35px}
            .header-text h1{font-size:18px;font-weight:bold;}
            .back-index{font-size:13px;padding:5px 8px;}
            .download-item{padding:15px 16px;}
            .download-name{font-size:15px;}
            .download-name i{font-size:18px;}
            .down-btn{
                padding:7px 0;
                width:95px;
                font-size:14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img class="avatar" src="IMG_20251109_114823.jpg" alt="头像">
            <div class="header-text">
                <h1>资源下载中心</h1>
            </div>
        </div>
        <a href="index.html" class="back-index">←返回首页</a>
    </div>

    <!-- 四项下载区域（左侧系统图标） -->
    <div class="download-wrap">
        <div class="download-item">
            <div class="download-name">
                <i class="fa-brands fa-android"></i>
                Android
            </div>
            <a href="#" class="down-btn">立即安装</a>
        </div>
        <div class="download-item">
            <div class="download-name">
                <i class="fa-brands fa-windows"></i>
                Windows
            </div>
            <a href="#" class="down-btn">立即安装</a>
        </div>
        <div class="download-item">
            <div class="download-name">
                <i class="fa-brands fa-apple"></i>
                Mac OS
            </div>
            <a href="#" class="down-btn">立即安装</a>
        </div>
        <div class="download-item">
            <div class="download-name">
                <i class="fa-brands fa-linux"></i>
                Linux
            </div>
            <a href="#" class="down-btn">立即安装</a>
        </div>
    </div>
</body>
</html>
