<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui;
        }
        
        body {
            background: #f0f4f9;
        }

        /* ====== 导航栏样式（与首页、联系页保持一致） ====== */
        header {
            background: #2563eb; 
            padding: 15px 5%; 
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }
        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        /* 胶囊导航菜单 */
        .nav {
            display: flex;
            gap: 10px;
        }
        .nav a {
            background: transparent !important;
            color: #fff !important;
            padding: 8px 20px !important;
            border-radius: 999px !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
        }
        .nav a.active {
            background: #ffffff !important;
            color: #2563eb !important;
        }
        .nav a:hover:not(.active) {
            background: rgba(255,255,255,0.2) !important;
            color: #fff !important;
        }

        /* ====== 下载区域样式 ====== */
        .download-wrap {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
        }
        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: #fff;
            border-radius: 10px;
            margin-bottom: 14px;
            box-shadow: 0 2px 10px #dde4ef;
        }
        .download-name {
            font-size: 17px;
            color: #222;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .download-name i {
            font-size: 20px;
            color: #2563eb;
        }
        .down-btn {
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            padding: 8px 22px;
            border-radius: 999px;
            transition: 0.2s;
            width: 110px;
            text-align: center;
        }
        .down-btn:hover {
            background: #1d4ed8;
        }

        /* ====== 底部版权样式（与首页保持一致） ====== */
        footer {
            background: #1e293b;
            color: #ccc;
            text-align: center;
            padding: 20px;
            margin-top: 40px; 
        }

        /* ====== 响应式适配 ====== */
        @media (max-width: 768px) {
            .nav {
                display: none; 
            }
            .header-avatar {
                width: 35px;
                height: 35px;
            }
            .logo {
                font-size: 18px;
            }
            .download-item {
                padding: 15px 16px;
            }
            .download-name {
                font-size: 15px;
            }
            .download-name i {
                font-size: 18px;
            }
            .down-btn {
                padding: 7px 0;
                width: 95px;
                font-size: 14px;
            }
        }
    </style>
</head>
