<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户端软件下载</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,system-ui}
        html,body{width:100%;min-height:100%;background:#f0f4f9;}
        
        .header{
            width:100%;
            background:linear-gradient(135deg,#3671e9,#2050c9);
            padding: 12px 5%;
            display:flex;
            align-items:center;
            gap: 12px;
            justify-content: space-between;
        }
        .header-left{
            display: flex;
            align-items: center;
            gap:12px;
        }
        .avatar{
            width:42px;
            height:42px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #fff;
        }
        .header-text h1{
            color:#fff;
            font-size:24px;
            font-weight:bold;
            line-height:1.1;
        }
        .back-index{
            color:#fff;
            text-decoration: none;
            border:1px solid #fff;
            padding:6px 12px;
            border-radius:6px;
            font-size:15px;
            transition: 0.2s;
        }
        .back-index:hover{
            background:#fff;
            color:#2050c9;
        }

        @media(max-width:768px){
            .header{padding:12px 5%;gap:10px}
            .avatar{width:35px;height:35px}
            .header-text h1{font-size:18px;font-weight:bold;}
            .back-index{font-size:13px;padding:5px 8px;}
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img class="avatar" src="IMG_20251109_114823.jpg" alt="头像">
            <div class="header-text">
                <h1>资源下载中心</h1>
            </div>
        </div>
        <a href="index.html" class="back-index">←返回首页</a>
    </div>
</body>
</html>
