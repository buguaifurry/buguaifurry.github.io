<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 阿布的资源网站</title>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 导航栏样式（与主站完全一致） */
        header {
            background: #2563eb;
            padding: 15px 5%;
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrap{
            display: flex;
            align-items: center;
            gap:12px;
        }
        .header-avatar{
            width:42px;
            height:42px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #fff;
        }
        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none; /* 去掉链接下划线 */
        }

        /* 胶囊导航 */
        .nav {
            display: flex;
            gap:10px;
        }
        .nav a {
            background: transparent !important;
            color: #fff !important;
            padding:8px 20px !important;
            border-radius:999px !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
        }
        .nav a.active {
            background: #ffffff !important;
            color: #2563eb !important;
        }
        .nav a:hover:not(.active) {
            background:rgba(255,255,255,0.2) !important;
            color: #fff !important;
        }

        /* 联系我们内容区样式 */
        .contact-section {
            width: 90%;
            max-width: 1000px;
            margin: 60px auto 40px; /* 调整了下边距，使其与下方网格更紧凑 */
            display: flex;
            align-items: center;
            gap: 50px;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .contact-text {
            flex: 1;
        }
        .contact-text h1 {
            font-size: 32px;
            color: #2563eb;
            margin-bottom: 20px;
        }
        .contact-text p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        .contact-text p i {
            color: #2563eb;
            width: 25px;
            margin-right: 10px;
        }
        .contact-qr {
            flex-shrink: 0;
            text-align: center;
        }
        .contact-qr img {
            width: 200px;
            height: 200px;
            border-radius: 8px;
            border: 2px solid #eee;
            object-fit: cover;
        }
        .contact-qr p {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }

        /* ====== 下方正方形二维码网格样式 ====== */
        .qr-grid-section {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto 60px;
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 电脑端一行4个 */
            gap: 20px;
        }
        .qr-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .qr-card .qr-img-wrap {
            width: 100%;
            aspect-ratio: 1 / 1; /* 核心：强制保持正方形比例 */
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .qr-card img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* 强制图片拉伸沾满四角，不留白 */
            display: block;
        }
        .qr-card h4 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        .qr-card p {
            font-size: 13px;
            color: #888;
        }

        /* 底部版权 */
        footer {
            background:#1e293b;
            color:#ccc;
            text-align:center;
            padding:20px;
            margin-top: 0;
        }

        /* 手机端自适应 */
        @media(max-width:768px){
            .contact-section {
                flex-direction: column;
                text-align: center;
                padding: 30px 20px;
            }
            .nav{display:none;} /* 手机端隐藏导航 */
            .header-avatar{
                width:35px;
                height:35px;
            }
            /* 手机端二维码网格变为2列 */
            .qr-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

            </div>
            <!-- 二维码 2 -->
            <div class="qr-card">

    <!-- 底部版权 -->
    <footer>
        <p>© 2025 版权所有 | 自制HTML网页</p>

</body>
</html>
