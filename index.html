<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CN布乖的个人导航页</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    
    <style>
        :root {
            --bg-color-v3: #121212; 
            --body-bg-v3: #000000;
            --card-bg: rgba(28, 28, 30, 0.92);
            --item-bg: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f5f5f7;
            --text-sub: #929297;
            --fade-end: #121212;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --china-red: #fe2c55;
        }

        [data-theme="light"] {
            --bg-color-v3: #FFFFFF;
            --body-bg-v3: #f2f2f7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --item-bg: #f9f9fb;
            --border-color: rgba(0, 0, 0, 0.05);
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --fade-end: #FFFFFF;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, "PingFang SC", sans-serif; 
            background: var(--body-bg-v3); 
            color: var(--text-main); 
            display: flex; justify-content: center; 
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* 电脑端背景1 */
        @media (min-width: 768px) {
            body {
                background-image: url("20251227_080032.jpg"); 
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
        }

        .app-container { 
            width: 100%; 
            background: var(--bg-color-v3); 
            min-height: 100vh; 
            position: relative; 
            box-shadow: var(--shadow); 
            transition: background 0.3s ease; 
        }

        @media (min-width: 768px) { 
            .app-container { 
                max-width: 800px; 
                margin: 40px 0; 
                border-radius: 28px; 
                overflow: hidden; 
            } 
        }

        /* 背景2：顶部横幅 */
        .header-banner-v2 { 
            width: 100%; height: 240px; 
            background: #333 url("20260321_200012.jpg") center/cover no-repeat; 
            position: relative; 
        }
        .header-banner-v2::after { 
            content: ""; position: absolute; left: 0; bottom: 0; width: 100%; height: 100px; 
            background: linear-gradient(to bottom, transparent, var(--fade-end)); 
        }
        
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; }
        .icon-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        
        .profile-card { margin: -60px 20px 0; padding: 0 20px 25px; background: var(--card-bg); backdrop-filter: blur(40px); border-radius: 28px; z-index: 10; position: relative; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .avatar { position: absolute; left: 20px; top: -28px; width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--bg-color-v3) !important; object-fit: cover; }
        
        .stats-wrapper { display: flex; justify-content: flex-end; width: 100%; height: 62px; }
        .stats-group { width: calc(100% - 100px); display: flex; justify-content: space-around; align-items: center; height: 100%; }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 800; }
        .stat-label { font-size: 0.7rem; color: var(--text-sub); }
        
        .user-info-block { margin-top: 25px; padding: 0 5px; }
        .name-row { display: flex; align-items: center; justify-content: space-between; }
        .user-name { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .verify-icon { width: 22px; height: 22px; background: url("https://img.icons8.com/color/48/verified-badge.png") center/contain no-repeat; margin-left: 8px; }
        .follow-btn-china { background-color: var(--china-red); color: #FFFFFF; border: none; padding: 7px 18px; font-size: 0.85rem; font-weight: 600; border-radius: 6px; cursor: pointer; text-decoration: none; }
        
        .content-section { padding: 25px 20px 100px; }
        .grid-layout { display: grid; gap: 12px; grid-template-columns: repeat(2, 1fr); margin-bottom: 25px; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: repeat(3, 1fr); } }

        /* --- 【回归按钮交互动画样式】 --- */
        .nav-card { 
            background: var(--item-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            padding: 22px 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            text-decoration: none; 
            color: inherit; 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s; /* 增加弹性过渡 */
            cursor: pointer;
        }

        /* 鼠标悬停：卡片轻微放大 */
        .nav-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        /* 点击瞬间：明显的缩小反馈（波动感） */
        .nav-card:active { 
            transform: scale(0.9); 
        }

        /* 悬停时图标摇晃动画 */
        @keyframes icon-shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .nav-card img { 
            width: 42px; height: 42px; 
            transition: transform 0.3s;
        }

        .nav-card:hover img {
            animation: icon-shake 0.4s ease-in-out infinite;
        }

        .nav-card span { font-size: 0.85rem; font-weight: 600; }
        
        /* 播放器及其他 */
        .qq-player { width: 100%; background: var(--card-bg); backdrop-filter: blur(25px); border-radius: 20px; padding: 12px 16px; border: 1px solid var(--border-color); display: flex; align-items: center; }
        .qq-album-art { width: 52px; height: 52px; border-radius: 12px; background: #333 url('https://img.icons8.com/fluency/96/music.png') center/50% no-repeat; }
        .qq-song-info { flex: 1; margin-left: 14px; }
        .qq-song-name { font-size: 0.95rem; font-weight: 700; margin: 0; }
        .qq-artist-name { font-size: 0.75rem; color: var(--text-sub); }
        .qq-controls { display: flex; gap: 16px; }
        .qq-btn svg { width: 24px; height: 24px; fill: var(--text-main); cursor: pointer; transition: 0.2s; }
        .qq-btn:active svg { transform: scale(0.8); }

        .game-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        .game-window { width: 95%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; }
        .close-game { color: white; margin-bottom: 12px; cursor: pointer; }
    </style>
</head>
<body data-theme="dark">

    <div class="app-container">
        <audio id="main-audio" loop autoplay src="http://aqqmusic.tc.qq.com/RS02063zeIkI2qaRsF.mp3?guid=8627029359&vkey=87E0A0D750190610D23BC7612044BC64CE116108C1D660FEC9135E461E53FD0D1E45D4CE318ADC54ADBDE12E1BD8719868235F9F5C1F6C60__v21563ff8a&uin=&fromtag=123052"></audio>
        
        <input type="file" id="bg-upload" accept="image/*" style="display: none;">

        <div class="top-nav">
            <div class="icon-btn" id="bg-trigger">🖼️</div>
            <div class="icon-btn" id="theme-btn">🌙</div>
        </div>

        <div class="header-banner-v2" id="banner"></div>

        <div class="profile-card">
            <img src="IMG_20251109_114823.jpg" class="avatar">
            <div class="stats-wrapper">
                <div class="stats-group">
                    <div class="stat-item"><span class="stat-val">128</span><span class="stat-label">关注</span></div>
                    <div class="stat-item"><span class="stat-val">3.5w</span><span class="stat-label">粉丝</span></div>
                    <div class="stat-item"><span class="stat-val">99+</span><span class="stat-label">动态</span></div>
                </div>
            </div>
            
            <div class="user-info-block">
                <div class="name-row">
                    <div style="display:flex; align-items:center;">
                        <h1 class="user-name">布乖Furry</h1>
                        <span class="verify-icon"></span>
                    </div>
                    <a href="https://你的关注链接.com" target="_blank" class="follow-btn-china">+ 关注一下</a>
                </div>
                <p style="font-size: 0.85rem; color: var(--text-sub); margin-top: 10px;">入驻平台：抖音、快手、哔哩哔哩、小红书</p>
            </div>
        </div>

        <div class="content-section">
            <div class="grid-layout">
                <a href="#" class="nav-card">
                    <img src="https://img.icons8.com/fluency/96/shopping-bag.png">
                    <span>布乖店铺</span>
                </a>
                <a href="#" class="nav-card">
                    <img src="https://img.icons8.com/fluency/96/compass.png">
                    <span>外网社区</span>
                </a>
                <a href="#" class="nav-card">
                    <img src="https://img.icons8.com/fluency/96/group.png">
                    <span>加粉丝群</span>
                </a>
                <a href="#" class="nav-card">
                    <img src="https://img.icons8.com/fluency/96/verified-badge.png">
                    <span>版权信息</span>
                </a>
                <div class="nav-card" id="play-game">
                    <img src="https://img.icons8.com/fluency/96/console.png">
                    <span>网页游戏</span>
                </div>
                <a href="#" class="nav-card">
                    <img src="https://img.icons8.com/fluency/96/trust.png">
                    <span>赞助支持</span>
                </a>
            </div>

            <div class="qq-player">
                <div class="qq-album-art"></div>
                <div class="qq-song-info">
                    <p class="qq-song-name">雨过后的风景</p>
                    <p class="qq-artist-name" id="play-status">正在播放 - 布乖Furry</p>
                </div>
                <div class="qq-controls">
                    <div class="qq-btn" id="play-btn">
                        <svg viewBox="0 0 24 24" id="play-icon"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="game-overlay" id="gameOverlay">
            <div class="close-game" id="closeBtn">✕ 退出游戏</div>
            <div class="game-window" id="flash-box"></div>
        </div>
    </div>

    <script>
        // ... (JS 部分逻辑保持不变)
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const playStatus = document.getElementById('play-status');
        const banner = document.getElementById('banner');
        const bgUpload = document.getElementById('bg-upload');

        document.getElementById('bg-trigger').onclick = () => bgUpload.click();
        bgUpload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => banner.style.backgroundImage = `url('${ev.target.result}')`;
                reader.readAsDataURL(file);
            }
        };

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                playStatus.textContent = "正在播放 - 布乖Furry";
            } else {
                audio.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                playStatus.textContent = "已暂停";
            }
        };

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById('play-game').onclick = () => {
            document.getElementById('gameOverlay').style.display = 'flex';
            document.getElementById('flash-box').appendChild(player);
            player.load({ url: "https://ruffle.rs/demo/flash_poker.swf" }); 
        };
        document.getElementById('closeBtn').onclick = () => {
            document.getElementById('gameOverlay').style.display = 'none';
            player.pause();
        };

        document.getElementById('theme-btn').onclick = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.setAttribute('data-theme', 'light');
                document.getElementById('theme-btn').textContent = '☀️';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('theme-btn').textContent = '🌙';
            }
        };
    </script>
</body>
</html>
