<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿布的资源网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 导航栏 */
        header {
            background: #2563eb;
            padding: 15px 5%;
        }
        .nav-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrap{
            display: flex;
            align-items: center;
            gap:12px;
        }
        .header-avatar{
            width:42px;
            height:42px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #fff;
        }
        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        /* 胶囊导航 */
        .nav {
            display: flex;
            gap:10px;
        }
        .nav a {
            background: transparent !important;
            color: #fff !important;
            padding:8px 20px !important;
            border-radius:999px !important;
            text-decoration: none !important;
            transition: all 0.3s ease !important;
        }
        .nav a.active {
            background: #ffffff !important;
            color: #2563eb !important;
        }
        .nav a:hover:not(.active) {
            background:rgba(255,255,255,0.2) !important;
            color: #fff !important;
        }

        .banner {
            height: 300px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        /* 修改：替换video为gif背景图样式 */
        .banner-bg-gif{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            min-width:100%;
            min-height:100%;
            object-fit: cover;
            z-index: -2;
        }
        .banner-mask{
            position: absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background-color: rgba(37, 99, 235, 0.4);
            z-index: -1;
        }
        .banner h1 {
            font-size: 38px;
            margin-bottom:12px;
            z-index: 2;
        }
        .banner p{
            z-index:2;
        }
        .container {
            width:90%;
            max-width:1200px;
            margin:50px auto;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap:30px;
        }
        .card {
            border:1px solid #eee;
            padding:25px;
            border-radius:8px;
            box-shadow:0 2px 8px #eee;
        }
        /* 卡片链接全局样式：无下划线、点击不变色 */
        .card-link{
            display:block;
            text-decoration:none;
            color:inherit;
        }
        .card-link:visited,
        .card-link:hover,
        .card-link:active{
            color:inherit;
            text-decoration:none;
        }
        .card h3 {
            color:#2563eb;
            margin-bottom:10px;
        }
        footer {
            background:#1e293b;
            color:#ccc;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }
        @media(max-width:768px){
            .container{grid-template-columns:1fr;}
            .nav{display:none;}
            .header-avatar{
                width:35px;
                height:35px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-box">
            <div class="logo-wrap">
                <!-- 已修改头像文件名 -->
                <img class="header-avatar" src="IMG_20251109_114823.jpg" alt="头像">
                <div class="logo">阿布的资源网站</div>
            </div>
            <div class="nav">
                <a href="#" class="active">首页</a>
                <a href="#">联系我们</a>
                <a href="https://buguaifurry.github.io/dev" target="_blank">官方网站</a>
                <a href="xiazaiyingyong.html">下载应用</a>
            </div>
        </div>
    </header>

    <section class="banner">
        <!-- 删掉video，替换成gif图片 -->
        <img class="banner-bg-gif" src="gif_260321_212041.gif" alt="背景动图">
        <div class="banner-mask"></div>
        <h1>欢迎访问我的GitHub总库静态网页</h1>
        <p>基于HTML5+CSS3制作，自适应手机/电脑端</p>
    </section>

    <main class="container">
        <!-- 模块一整卡跳转，样式完全原样不变 -->
        <div class="card">
            <a class="card-link" href="https://buguaifurry.github.io/dev" target="_blank">
                <h3>模块一</h3>
                <p>这是第一个内容卡片，可自由修改文字、图片、内容。</p>
            </a>
        </div>
        
        <div class="card">
            <a class="card-link" href="https://buguaifurry.github.io/download" target="_blank">
                <h3>资源下载中心</h3>
                <p>页面采用grid布局，手机自动变成单列排版。</p>
            </a>
        </div>
        
        <div class="card">
            <h3>模块三</h3>
            <p>CSS全部内嵌，单个html文件即可运行。</p>
        </div>
    </main>

    <footer>
        <p>© 2025 版权所有 | 自制HTML网页</p>
    </footer>

    <script>
        const navLinks = document.querySelectorAll('.nav a');
        navLinks.forEach(item=>{
            item.onclick = function(e){
                // 首页和下载应用不走新标签拦截，官方网站是外链不做active切换
                let href = this.getAttribute('href');
                if(href !== 'xiazaiyingyong.html' && href !== 'https://buguaifurry.github.io/dev'){
                    e.preventDefault();
                    navLinks.forEach(link=>link.classList.remove('active'));
                    this.classList.add('active');
                }
            }
        })
    </script>
</body>
</html>
